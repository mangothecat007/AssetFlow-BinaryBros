<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="oaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#46c5a5" /> <!-- Primary theme color -->
      <stop offset="100%" stop-color="#2a7763" />
    </linearGradient>
    <linearGradient id="oaGradDanger" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Shield Polygon (Represents Security/Defense) -->
  <path d="M100 20 L170 45 L170 100 C170 145 140 180 100 195 C60 180 30 145 30 100 L30 45 Z" 
        fill="none" stroke="url(#oaGrad)" stroke-width="12" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- Inner Dynamic Ring (Represents the 'O' in OneAlert and a radar pulse) -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="url(#oaGrad)" stroke-width="8" opacity="0.4"/>

  <!-- The "1" / Alert Mark in the center (Represents '1' and an exclamation point) -->
  <path d="M92 55 L114 55 L108 120 L92 120 Z" fill="url(#oaGradDanger)" filter="url(#shadow)"/>
  <circle cx="100" cy="142" r="10" fill="url(#oaGradDanger)" filter="url(#shadow)"/>
</svg>
